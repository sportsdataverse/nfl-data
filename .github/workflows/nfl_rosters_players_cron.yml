# NFL rosters + players + player-stats build + publish
#
# Builds the SDV-native public-tier datasets via sportsdataverse and uploads
# them to sportsdataverse/sportsdataverse-data:
#   - rosters:      build_nfl_rosters(<season>)     -> roster_<season>.parquet -> "nfl_rosters" release
#   - players:      build_nfl_players()             -> players.parquet         -> "nfl_players" release
#   - player-stats: build_nfl_player_stats(1999..N) -> player_stats.parquet     -> "nfl_player_stats" release
#   - team-stats:   build_nfl_team_stats(1999..N)   -> team_stats.parquet       -> "nfl_team_stats" release
#   - qbr:          build_nfl_qbr_{season,week}(2006..N) -> qbr_*_level.parquet  -> "nfl_espn_qbr" release
#
# rosters/players use the NFL Shield rosters API + ESPN core-v2 athletes (public
# tiers). player-stats aggregates the SDV-native play-by-play release into one
# combined week-level parquet (all seasons, REG+POST, offense), mirroring
# nflverse player_stats. No raw repo and no model artifacts are needed (unlike
# the model_pbp cron), so there is no nfl-raw checkout and no model cache here.
# build_nfl_players walks ~7,500 ESPN athlete $refs sequentially and takes
# several minutes — expected.
#
# Off-season runs still publish (rosters change with transactions/cuts; the
# player index grows as new athletes are added). --clobber upload is idempotent.

name: NFL rosters + players + player-stats + team-stats + QBR build + publish

on:
  workflow_dispatch:
    inputs:
      seasons:
        description: >
          Roster season or inclusive range, e.g. "2024" or "2022:2024".
          Defaults to the current NFL season (determined at run time).
        required: false
        default: ""
      skip_players:
        description: "Set to 'true' to skip the (slow) players rebuild."
        required: false
        default: "false"
      skip_player_stats:
        description: "Set to 'true' to skip the player-stats rebuild."
        required: false
        default: "false"
      skip_team_stats:
        description: "Set to 'true' to skip the team-stats rebuild."
        required: false
        default: "false"
      player_stats_seasons:
        description: >
          player-stats season range, e.g. "1999:2024". Defaults to the full
          historical range through the current NFL season (resolved at run time).
        required: false
        default: ""
      team_stats_seasons:
        description: >
          team-stats season range, e.g. "1999:2024". Defaults to the full
          historical range through the current NFL season (resolved at run time).
        required: false
        default: ""
      skip_qbr:
        description: "Set to 'true' to skip the ESPN QBR rebuild."
        required: false
        default: "false"
      qbr_seasons:
        description: >
          ESPN QBR season range, e.g. "2006:2024". Defaults to 2006..<current
          NFL season> (resolved at run time). 2006 is the earliest QBR season.
        required: false
        default: ""

  schedule:
    # Mondays 09:00 UTC, September through February (active NFL season window).
    - cron: "0 9 * 9-12,1,2 1"

concurrency:
  group: nfl-rosters-players-build
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Build + publish nfl_rosters / nfl_players / nfl_player_stats / nfl_team_stats / nfl_espn_qbr
    runs-on: ubuntu-latest

    steps:
      - name: Checkout nfl-data
        uses: actions/checkout@v4
        with:
          path: nfl-data

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync nfl-data Python deps
        working-directory: nfl-data/python
        run: uv sync --frozen

      # build_nfl_rosters / build_nfl_players landed on sdv-py main after the
      # pinned PyPI release; install from git until a release carries them.
      # TODO: pin to a PyPI release once it ships build_nfl_rosters/build_nfl_players.
      - name: Install sportsdataverse from git (main)
        working-directory: nfl-data/python
        run: |
          uv pip install \
            "sportsdataverse @ git+https://github.com/sportsdataverse/sportsdataverse-py.git@main"

      - name: Verify builders import
        working-directory: nfl-data/python
        run: |
          uv run python -c "from sportsdataverse.nfl import build_nfl_rosters, build_nfl_players, build_nfl_player_stats, build_nfl_team_stats; print('builders OK')"

      # Resolve roster season: workflow_dispatch input wins; otherwise the
      # current NFL season (Jan–Jul roll back one year).
      - name: Resolve seasons input
        id: seasons
        run: |
          INPUT="${{ github.event.inputs.seasons }}"
          if [ -n "$INPUT" ]; then
            echo "seasons=$INPUT" >> "$GITHUB_OUTPUT"
          else
            MONTH=$(date -u +%m)
            YEAR=$(date -u +%Y)
            if [ "$MONTH" -le 7 ]; then
              SEASON=$((YEAR - 1))
            else
              SEASON=$YEAR
            fi
            echo "seasons=$SEASON" >> "$GITHUB_OUTPUT"
          fi

      # SDV_DATA_TOKEN must be a PAT with Contents: write on
      # sportsdataverse/sportsdataverse-data (the GITHUB_TOKEN fallback fails
      # for cross-repo uploads). See the model_pbp cron for the same note.
      - name: Publish nfl_rosters
        working-directory: nfl-data/python
        env:
          GH_TOKEN: ${{ secrets.SDV_DATA_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          uv run python -m nfl_model_publish rosters \
            --seasons "${{ steps.seasons.outputs.seasons }}" \
            --out out/rosters \
            --tag nfl_rosters \
            --repo sportsdataverse/sportsdataverse-data

      - name: Publish nfl_players
        if: ${{ github.event.inputs.skip_players != 'true' }}
        working-directory: nfl-data/python
        env:
          GH_TOKEN: ${{ secrets.SDV_DATA_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          uv run python -m nfl_model_publish players \
            --out out/players \
            --tag nfl_players \
            --repo sportsdataverse/sportsdataverse-data

      # Resolve the player-stats season range: workflow_dispatch input wins;
      # otherwise the full historical range 1999..<current NFL season>.
      - name: Resolve player-stats seasons
        id: ps_seasons
        run: |
          INPUT="${{ github.event.inputs.player_stats_seasons }}"
          if [ -n "$INPUT" ]; then
            echo "seasons=$INPUT" >> "$GITHUB_OUTPUT"
          else
            MONTH=$(date -u +%m)
            YEAR=$(date -u +%Y)
            if [ "$MONTH" -le 7 ]; then
              END=$((YEAR - 1))
            else
              END=$YEAR
            fi
            echo "seasons=1999:$END" >> "$GITHUB_OUTPUT"
          fi

      # player-stats: rebuild the full combined week-level parquet (all seasons,
      # REG+POST, offense) from the SDV-native play-by-play and publish to the
      # nfl_player_stats release. --clobber upload is idempotent.
      - name: Publish nfl_player_stats
        if: ${{ github.event.inputs.skip_player_stats != 'true' }}
        working-directory: nfl-data/python
        env:
          GH_TOKEN: ${{ secrets.SDV_DATA_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          uv run python -m nfl_model_publish player-stats \
            --seasons "${{ steps.ps_seasons.outputs.seasons }}" \
            --out out/player_stats \
            --tag nfl_player_stats \
            --repo sportsdataverse/sportsdataverse-data

      # Resolve the team-stats season range: workflow_dispatch input wins;
      # otherwise the full historical range 1999..<current NFL season>.
      - name: Resolve team-stats seasons
        id: ts_seasons
        run: |
          INPUT="${{ github.event.inputs.team_stats_seasons }}"
          if [ -n "$INPUT" ]; then
            echo "seasons=$INPUT" >> "$GITHUB_OUTPUT"
          else
            MONTH=$(date -u +%m)
            YEAR=$(date -u +%Y)
            if [ "$MONTH" -le 7 ]; then
              END=$((YEAR - 1))
            else
              END=$YEAR
            fi
            echo "seasons=1999:$END" >> "$GITHUB_OUTPUT"
          fi

      # team-stats: rebuild the full combined week-level parquet (all seasons,
      # REG+POST, offense + defense + kicking + returns) from the SDV-native
      # play-by-play and publish to the nfl_team_stats release. --clobber upload
      # is idempotent.
      - name: Publish nfl_team_stats
        if: ${{ github.event.inputs.skip_team_stats != 'true' }}
        working-directory: nfl-data/python
        env:
          GH_TOKEN: ${{ secrets.SDV_DATA_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          uv run python -m nfl_model_publish team-stats \
            --seasons "${{ steps.ts_seasons.outputs.seasons }}" \
            --out out/team_stats \
            --tag nfl_team_stats \
            --repo sportsdataverse/sportsdataverse-data

      # Resolve the QBR season range: workflow_dispatch input wins; otherwise
      # 2006 (earliest ESPN QBR season) .. <current NFL season>.
      - name: Resolve QBR seasons
        id: qbr_seasons
        run: |
          INPUT="${{ github.event.inputs.qbr_seasons }}"
          if [ -n "$INPUT" ]; then
            echo "seasons=$INPUT" >> "$GITHUB_OUTPUT"
          else
            MONTH=$(date -u +%m)
            YEAR=$(date -u +%Y)
            if [ "$MONTH" -le 7 ]; then
              END=$((YEAR - 1))
            else
              END=$YEAR
            fi
            echo "seasons=2006:$END" >> "$GITHUB_OUTPUT"
          fi

      # qbr: scrape ESPN's fitt/v3 QBR endpoint into the nflverse-shape
      # qbr_season_level + qbr_week_level parquets and publish to the
      # nfl_espn_qbr release. --clobber upload is idempotent.
      - name: Publish nfl_espn_qbr
        if: ${{ github.event.inputs.skip_qbr != 'true' }}
        working-directory: nfl-data/python
        env:
          GH_TOKEN: ${{ secrets.SDV_DATA_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          uv run python -m nfl_model_publish qbr \
            --seasons "${{ steps.qbr_seasons.outputs.seasons }}" \
            --out out/qbr \
            --tag nfl_espn_qbr \
            --repo sportsdataverse/sportsdataverse-data
